# Plugins are explicit child processes. etch does not auto-discover or run
# project executables. Each enabled plugin is started through the platform shell
# from the current project working directory, then speaks JSONL requests and
# responses over stdin/stdout. Stderr is diagnostic text only.
#
# The first plugin protocol version exposes tools. On startup etch sends:
#
# {"id":"1","method":"initialize","params":{"protocolVersion":"0.1.0"}}
#
# The plugin responds with its display name and model-facing tool schemas:
#
# {
#   "id": "1",
#   "result": {
#     "name": "example",
#     "tools": [{
#       "name": "example_echo",
#       "description": "Echo text from an example plugin.",
#       "parallelSafety": "read_only",
#       "parameters": {
#         "type": "object",
#         "properties": {"text": {"type": "string"}}
#       }
#     }]
#   }
# }
#
# When the model calls a plugin tool, etch sends:
#
# {
#   "id": "2",
#   "method": "tool.execute",
#   "params": {
#     "callID": "call_1",
#     "name": "example_echo",
#     "arguments": {"text": "hello"}
#   }
# }
#
# The plugin returns model-visible text content:
#
# {
#   "id": "2",
#   "result": {"content": [{"type": "text", "text": "hello"}]}
# }
#
# [[plugins]]
# name = "example"
# command = "go run ./plugins/example/main.go"
# timeout_seconds = 30
# Plugins run with a sanitized environment by default. Add env names only when
# a plugin explicitly needs them; secrets such as model API keys are not
# forwarded unless listed here.
# env = ["GIT_CONFIG_GLOBAL"]
# disabled = true

[subagents]
# Enable configured child-agent profiles through the parent model's task tool.
# At least one enabled [[subagents.profile]] entry is also required.
# enabled = false

# Maximum task tool calls accepted during one parent turn.
# max_per_turn = 4

# Maximum child agents that may execute at the same time. The first
# implementation runs tool calls through the normal tool batch path and uses
# this value as an advertised configuration limit.
# max_concurrent = 2

# Subagent profiles are named child-agent flavors. The parent model sees the
# names and descriptions in the task tool schema, then chooses which profile to
# spawn for a delegated task. Empty provider/model/OpenAI fields inherit from
# the parent chat configuration; OpenAI-compatible profiles need either a
# profile model or provider.model. The parent model cannot override
# max_tool_rounds at runtime; subagent loop budgets are owned by config.
#
# allowed_tools is the child capability boundary. Profiles may include
# mutation-capable tools such as write, edit, or bash when the operator trusts
# that child profile. Parallel child execution is governed by max_concurrent.
# If a profile includes task, nested subagents inherit a registry capped by the
# parent profile allowlist.
#
# Each subagent runs in its own JSONL child session. The parent receives only a
# compact task result plus the child session id; the full child transcript can be
# inspected with etch show or resumed with etch resume.
#
# [[subagents.profile]]
# name = "explore"
# description = "Broad read-only explorer for large or unfamiliar areas; use when mapping many files, packages, or flows is worth a parallel investigation."
# provider = "openai"
# model = "gpt-5.5"
# base_url = "https://api.openai.com/v1"
# openai_api = "responses"
# reasoning_effort = "medium"
# reasoning_summary = "auto"

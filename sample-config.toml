# Harness sample configuration.
#
# Copy this file to .harness/config.toml inside a project and uncomment the
# values you want to set. Explicit CLI flags override this file. Credential
# environment variables are read separately for API keys and access tokens.

[session]
# Directory for JSONL session logs.
# dir = ".harness/sessions"

# Maximum model/tool exchange rounds allowed for one user turn.
# max_tool_rounds = 32

# Compatibility fallback for compaction retention when keep_recent_tokens is
# disabled by code or not supplied by direct callers.
# keep_messages = 12

[context]
# Enable automatic context compaction before chat model calls when the projected
# context reaches the configured approximate token threshold. The original JSONL
# history stays on disk; auto compaction appends a context.summary event.
# auto_compact = false

# Approximate projected context size that triggers auto compaction. Harness uses
# its dependency-free token estimate, not a model-specific tokenizer.
# auto_compact_threshold_tokens = 120000

# Approximate amount of recent raw context retained after compaction. This is
# the primary Pi-style retention control for /compact, harness compact, and auto
# compaction.
# keep_recent_tokens = 20000

[provider]
# Model provider name. Supported built-ins are "echo" and "openai".
# name = "echo"

# Provider-specific model identifier.
# model = "gpt-5.5"

[openai]
# OpenAI-compatible API base URL.
# base_url = "https://api.openai.com/v1"

# API shape used by the bundled provider: "chat" or "responses".
# api = "chat"

# Reasoning effort for models that support it: "none", "minimal", "low",
# "medium", "high", or "xhigh".
# reasoning_effort = "minimal"

# Displayable reasoning summaries for models that support them: "auto",
# "concise", or "detailed".
# reasoning_summary = "auto"

[hooks]
# Hooks are external shell commands. Harness sends a JSON envelope on stdin and
# reads an optional JSON object from stdout. Stderr is diagnostic text. A
# non-zero exit status, invalid stdout JSON, or timeout fails the surrounding
# harness operation.
#
# Hook commands run through the platform shell from the current project working
# directory. The default timeout is 30 seconds when timeout_seconds is omitted.
#
# Harness sends this envelope shape to every hook:
#
# {
#   "version": 1,
#   "event": "PreToolUse",
#   "cwd": "/absolute/project/path",
#   "payload": { "...": "event-specific fields" }
# }
#
# Hooks run sequentially in config file order. If multiple hooks match the same
# event, the first matching hook runs first, then the second, and so on. For
# mutation-capable events, each later hook sees the value returned by earlier
# hooks. This makes hooks behave like deterministic transformer nodes in the
# agent loop.
#
# Blocking events stop early:
#
# - UserPromptSubmit stops prompt admission when a hook returns block=true.
# - PreToolUse stops later PreToolUse hooks for that tool call when blocked.
# - PreCompact stops compaction when blocked.
#
# Non-blocking transform events continue through all matching hooks unless a
# hook process fails, times out, or returns invalid JSON.
#
# Supported events:
#
# - SessionStart
# - UserPromptSubmit
# - TurnStart
# - TurnComplete
# - ContextBuild
# - PreToolUse
# - PostToolUse
# - PreCompact
# - PostCompact
#
# Matcher behavior:
#
# - matcher is a Go regular expression, not a shell glob.
# - Empty matcher or "*" matches every event instance.
# - SessionStart matches against the reason: "new" or "resume".
# - PreToolUse and PostToolUse match against the tool name, such as "bash".
# - PreCompact and PostCompact match against the trigger, currently "manual".
# - UserPromptSubmit, TurnStart, TurnComplete, and ContextBuild ignore matcher.
#
# Prefer anchored matchers for policy hooks:
#
# matcher = "^(bash|write|edit)$"
#
# A looser matcher like "bash|write|edit" also works, but it matches substrings.
#
# SessionStart payload:
#
# {
#   "sessionPath": ".harness/sessions/current.jsonl",
#   "sessionId": "session-id",
#   "reason": "new"
# }
#
# SessionStart stdout is ignored, but should be empty or "{}" if written.
#
# UserPromptSubmit payload:
#
# {
#   "prompt": "user text",
#   "sessionPath": ".harness/sessions/current.jsonl"
# }
#
# UserPromptSubmit stdout may be empty or:
#
# {"prompt": "replacement prompt"}
# {"block": true, "reason": "why the prompt is rejected"}
#
# TurnStart payload:
#
# {
#   "sessionPath": ".harness/sessions/current.jsonl",
#   "sessionId": "session-id",
#   "userEventId": "event_2",
#   "prompt": "user text"
# }
#
# TurnStart stdout is ignored, but should be empty or "{}" if written.
#
# TurnComplete payload:
#
# {
#   "sessionPath": ".harness/sessions/current.jsonl",
#   "sessionId": "session-id",
#   "userEventId": "event_2",
#   "assistantEventId": "event_5",
#   "prompt": "user text",
#   "assistantText": "final answer",
#   "toolCalls": 2
# }
#
# TurnComplete stdout is ignored, but should be empty or "{}" if written.
#
# ContextBuild payload:
#
# {
#   "sessionPath": ".harness/sessions/current.jsonl",
#   "round": 0,
#   "messages": [
#     {"role": "system", "content": "..."},
#     {"role": "user", "content": "..."}
#   ]
# }
#
# ContextBuild stdout may be empty or:
#
# {"messages": [{"role": "user", "content": "replacement context"}]}
#
# PreToolUse payload:
#
# {
#   "sessionPath": ".harness/sessions/current.jsonl",
#   "tool": {
#     "id": "call_1",
#     "name": "bash",
#     "arguments": "{\"command\":\"go test ./...\"}"
#   }
# }
#
# PreToolUse stdout may be empty or:
#
# {"arguments": "{\"command\":\"go test ./...\",\"timeoutSeconds\":60}"}
# {"block": true, "reason": "dangerous command"}
#
# PostToolUse payload:
#
# {
#   "sessionPath": ".harness/sessions/current.jsonl",
#   "tool": {"id": "call_1", "name": "read", "arguments": "{\"path\":\"x\"}"},
#   "output": "model-visible tool output",
#   "error": false
# }
#
# PostToolUse stdout may be empty or:
#
# {"output": "redacted or summarized output"}
# {"output": "replacement output", "error": true}
#
# PreCompact payload:
#
# {
#   "sessionPath": ".harness/sessions/current.jsonl",
#   "trigger": "manual",
#   "rangeStartId": "event_1",
#   "rangeEndId": "event_20",
#   "firstKeptEventId": "event_21"
# }
#
# PreCompact stdout may be empty or:
#
# {"block": true, "reason": "do not compact this session"}
# {"summary": "custom summary that skips model summarization"}
#
# PostCompact payload:
#
# {
#   "sessionPath": ".harness/sessions/current.jsonl",
#   "trigger": "manual",
#   "summaryEventId": "event_30",
#   "firstKeptEventId": "event_21",
#   "summary": "persisted summary"
# }
#
# PostCompact stdout is ignored, but should be empty or "{}" if written.

